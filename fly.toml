app = "huawei-appgallery-autopublish"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  UPLOAD_DIR = "/data/uploads"
  WORKER_POLL_INTERVAL_MS = "5000"

[mounts]
  source = "appgallery_uploads"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
